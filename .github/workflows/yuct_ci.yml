name: YUCT Core Precision CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-lattice:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code Connectome
      uses: actions/checkout@v4

    - name: Set up Pure Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Fundamental Physics Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install sympy

    - name: Execute O(1) High-Load Prime Benchmark
      run: |
        python benchmark_compare.py
